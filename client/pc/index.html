<!DOCTYPE html>
<html lang="en">

<head>
    <script>
      (function() {
            var ua = navigator.userAgent;
            var isMobile = /Mobi|Android|iPhone|iPad/i.test(ua);
            // 如果是移动设备，且当前不在 /mobile 路径下，则跳转
            if (isMobile && !window.location.pathname.startsWith('/mobile')) {
                window.location.href = '/mobile/index.html';
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Home</title>
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body>

    <!-- Header / Navigation -->
    <header class="navbar">
        <div class="container">
            <h1 class="logo">🎬 MyStream</h1>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search videos...">
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <div class="filter-tags">
            <span class="tag active" data-filter="all">All</span>
            <span class="tag" data-filter="mp4">MP4</span>
            <span class="tag" data-filter="mkv">MKV</span>
        </div>

        <div id="videoGrid" class="video-grid">
            <!-- Loading State -->
            <div class="loader">Loading your library...</div>
        </div>
    </main>

    <!-- Fullscreen Player Modal -->
 <div id="videoModal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        
        <div class="player-layout">
            <!-- 左侧：播放器和热力图 -->
            <div class="player-main">
                <div class="video-container">
                    <video id="mainPlayer" controls playsinline></video>
                  
                </div>
                <h2 id="modalTitle" class="modal-video-title">Video Title</h2>
            </div>

            <!-- 右侧：片段列表 -->
            <div class="player-sidebar">
                <h3>🎬 观看片段</h3>
                 <div class="record-toggle-container">
            <span class="toggle-label">自动记录</span>
            <label class="switch">
                <input type="checkbox" id="autoRecordToggle" checked>
                <span class="slider round"></span>
            </label>
        </div>
                <div id="segmentList" class="segment-list">
                    <!-- 片段项会动态插入到这里 -->
                </div>
            </div>
        </div>
    </div>
</div>

    <script src="js/app.js"></script>
</body>
</html>
