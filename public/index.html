<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>视频库</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: Arial;
        }

        h1 {
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 200px);
            gap: 20px;
            padding: 20px;
        }

        .card {
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .thumb {
            width: 100%;
            height: 120px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .title {
            text-align: center;
            margin-top: 5px;
            font-size: 14px;
        }

        video {
            display: block;
            margin: 20px auto;
        }
    </style>
</head>
<body>

<h1>🎬 我的影片库</h1>
<h2>⚙️ 设置</h2>

<div>
    视频目录：<input id="videoDir"><br>
    封面目录：<input id="coverDir"><br>
    数据库路径：<input id="dbPath"><br>
    <button onclick="saveConfig()">保存</button>
</div>

<div class="grid" id="list"></div>

<video id="player" controls width="800"></video>

<script>
fetch('/api/videos')
.then(res => res.json())
.then(data => {
    const list = document.getElementById('list');

    data.forEach(v => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
            <div class="thumb">▶</div>
            <div class="title">${v}</div>
        `;

        card.onclick = () => {
            document.getElementById('player').src = '/videos/' + v;
        };

        list.appendChild(card);
    });
});
// 加载配置
fetch('/api/config')
.then(res => res.json())
.then(cfg => {
    videoDir.value = cfg.videoDir;
    coverDir.value = cfg.coverDir;
    dbPath.value = cfg.dbPath;
});

// 保存配置
function saveConfig() {
    fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            videoDir: videoDir.value,
            coverDir: coverDir.value,
            dbPath: dbPath.value
        })
    }).then(() => alert('保存成功'));
}
</script>

</body>
</html>
