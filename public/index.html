<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Video Library</title>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: Arial, sans-serif; }
        .app { display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar { width: 280px; background: #1a1a1a; padding: 20px; border-right: 1px solid #333; overflow-y: auto; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; font-size: 22px; }
        .panel { margin-top: 20px; background: #222; padding: 15px; border-radius: 8px; }
        .panel h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #444; padding-bottom: 8px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; background: #333; color: white; border: 1px solid #555; border-radius: 4px; }
        
        .btn-primary { width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; margin-top: 5px; }
        .btn-primary:hover { background: #45a049; }
        .btn-scan { background: #2196F3; margin-top: 15px; }
        .btn-scan:hover { background: #1976D2; }
        /* Active Downloads Queue */
        .download-item {
            background: #333;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .dl-title {
            font-size: 12px;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .dl-progress-bg {
            background: #111;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }
        .dl-progress-fill {
            background: #2196F3;
            height: 100%;
            width: 0%;
            transition: width 0.5s linear;
        }
        .dl-percentage {
            font-size: 10px;
            color: #ccc;
            text-align: right;
            margin-top: 3px;
        }
        /* Added Date Text */
        .added-date {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin-top: 6px;
            padding-bottom: 5px;
        }
        /* Delete Button */
        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(229, 9, 20, 0.8);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 5px;
            cursor: pointer;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
            z-index: 2;
        }
        .card:hover .delete-btn {
            opacity: 1;
        }
        .delete-btn:hover {
            background: rgba(229, 9, 20, 1);
        }

        /* Main Area */
        .main { flex: 1; overflow-y: auto; padding: 30px; background: #0f0f0f; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 28px; }

        /* Video Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .card { cursor: pointer; transition: 0.2s; background: #222; border-radius: 8px; padding-bottom: 10px; overflow: hidden; position: relative; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.5); background: #2a2a2a; }

        .thumb {
            height: 140px;
            background-color: #333;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 8px;
        }

        .badges-top { display: flex; gap: 5px; }
        .badge { background: rgba(0,0,0,0.8); padding: 3px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        
        .format { color: #4CAF50; }
        .res { color: #2196F3; }
        .duration { color: #fff; align-self: flex-end; }
        
       .progress-bar { 
            height: 4px; 
            background: #555; 
            width: 100%; 
        }
        .progress-fill { height: 100%; background: #e50914; width: 0%; }

         .title { 
            text-align: center; 
            margin-top: 8px; 
            padding: 0 10px; 
            font-size: 14px; 
            color: #ddd; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        /* Video Player Modal */
        .player-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.9); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px); }
        .player-content { width: 80%; max-width: 1200px; background: #000; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); display: flex; flex-direction: column; }
        .player-header { background: #1a1a1a; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .player-title { font-size: 18px; font-weight: bold; color: #fff; }
        .close-btn { color: #aaa; cursor: pointer; font-size: 24px; transition: 0.2s; }
        .close-btn:hover { color: #ff4444; }
        .player-content video { width: 100%; max-height: 80vh; outline: none; }
    </style>
</head>
<body>

<div class="app">
    <div class="sidebar">
        <h2>🎬 Video Manager</h2>
        <div class="panel">
            <h3>📥 Download</h3>
            <div class="form-group"><label>Video Name</label><input id="dlName"></div>
            <div class="form-group"><label>m3u8 URL</label><input id="dlUrl"></div>
            <button class="btn-primary" onclick="startDownload()">Download Video</button>
        </div>
        <div class="panel">
            <h3>⚙️ Settings</h3>
            <div class="form-group"><label>Video Storage</label><input id="videoDir"></div>
            <div class="form-group"><label>Cover Storage</label><input id="coverDir"></div>
            <div class="form-group"><label>DB Storage</label><input id="dbPath"></div>
            <button class="btn-primary" onclick="saveConfig()">Save Settings</button>
        </div>
        <!-- Active Downloads Panel -->
        <div class="panel" id="queuePanel" style="display: none;">
            <h3>🔄 Active Downloads</h3>
            <div id="downloadQueue"></div>
        </div>
    </div>
    <div class="main">
        <div class="header">
            <h1>My Library</h1>
            <button class="btn-primary btn-scan" style="width: auto; padding: 10px 20px;" onclick="scanLibrary()">🔄 Scan Library</button>
        </div>
        <div class="grid" id="list"></div>
    </div>
</div>

<div id="playerModal" class="player-modal">
    <div class="player-content">
        <div class="player-header">
            <span id="nowPlayingTitle" class="player-title">Loading...</span>
            <span class="close-btn" onclick="closePlayer()">✖</span>
        </div>
        <video id="player" controls></video>
    </div>
</div>

<!-- 其他 HTML 内容... -->

<!-- 引入入口脚本，浏览器会自动按需加载其他互相依赖的模块 -->
<script type="module" src="./js/main.js"></script>

</body>
</html>
</body>
</html>
